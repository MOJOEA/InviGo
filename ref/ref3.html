<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neo-Brutalist Feature Tour</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&family=Space+Grotesk:wght@700&display=swap');

        :root {
            --accent-yellow: #FACC15;
            --accent-pink: #FB7185;
            --accent-blue: #60A5FA;
            --border-color: #000;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: #FFFBEB;
            overflow-x: hidden;
        }

        /* --- Mock Interface Styles --- */
        .neo-nav {
            width: 80px;
            border-right: 4px solid black;
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 2rem;
            gap: 1.5rem;
            z-index: 10;
        }

        .nav-item {
            width: 50px;
            height: 50px;
            border: 3px solid black;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 4px 4px 0 0 black;
        }

        .nav-item:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 0 black;
            background: #FEF08A;
        }

        .nav-item.active {
            background: black;
            color: white;
            box-shadow: 2px 2px 0 0 #666;
            transform: translate(2px, 2px);
        }

        .neo-card {
            background: white;
            border: 3px solid black;
            border-radius: 1rem;
            box-shadow: 6px 6px 0 0 black;
            overflow: hidden;
        }

        .neo-btn {
            border: 3px solid black;
            border-radius: 0.5rem;
            font-weight: 700;
            box-shadow: 4px 4px 0 0 black;
            transition: active 0.1s;
            cursor: pointer;
        }

        .neo-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 0 black;
        }

        .neo-btn:active {
            transform: translate(4px, 4px);
            box-shadow: 0 0 0 0 black;
        }

        /* --- TOUR SYSTEM STYLES --- */

        /* 1. Backdrop (พื้นหลังมืด) */
        #tour-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(2px);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            /* Dot Pattern Overlay */
            background-image: radial-gradient(#ffffff 1px, transparent 1px);
            background-size: 20px 20px;
        }

        #tour-backdrop.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* 2. Highlighter (กรอบสีเหลืองวิ่งไปหาเป้าหมาย) */
        #tour-highlighter {
            position: absolute;
            border: 5px solid var(--accent-yellow);
            border-radius: 12px;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5);
            /* Hard Focus trick */
            z-index: 1000;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            opacity: 0;
        }

        #tour-highlighter.active {
            opacity: 1;
            animation: pulseBorder 2s infinite;
        }

        @keyframes pulseBorder {
            0% {
                border-color: var(--accent-yellow);
                transform: scale(1);
            }

            50% {
                border-color: white;
                transform: scale(1.02);
            }

            100% {
                border-color: var(--accent-yellow);
                transform: scale(1);
            }
        }

        /* 3. Popover (กล่องข้อความ) */
        #tour-popover {
            position: absolute;
            width: 320px;
            background: white;
            border: 4px solid black;
            border-radius: 1rem;
            padding: 1.5rem;
            z-index: 1001;
            box-shadow: 10px 10px 0 0 black;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        #tour-popover.active {
            opacity: 1;
        }

        /* 4. Arrow (ลูกศรวาดมือ) */
        #tour-arrow {
            position: absolute;
            z-index: 1002;
            width: 60px;
            height: 60px;
            pointer-events: none;
            transition: all 0.4s ease;
            filter: drop-shadow(3px 3px 0px black);
            color: var(--accent-yellow);
        }

        /* Badge Number */
        .step-badge {
            background: var(--accent-yellow);
            border: 3px solid black;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.2rem;
            border-radius: 8px;
            position: absolute;
            top: -20px;
            left: -20px;
            transform: rotate(-10deg);
            box-shadow: 3px 3px 0 0 black;
        }
    </style>
</head>

<body class="h-screen flex overflow-hidden">

    <!-- NAVIGATION (Mock) -->
    <nav class="neo-nav">
        <div class="nav-item bg-black text-white" id="nav-home"><i class="fa-solid fa-house"></i></div>
        <div class="nav-item bg-white" id="nav-search"><i class="fa-solid fa-magnifying-glass"></i></div>
        <div class="nav-item bg-white" id="nav-calendar"><i class="fa-regular fa-calendar"></i></div>
        <div class="nav-item bg-white mt-auto mb-4" id="nav-settings"><i class="fa-solid fa-gear"></i></div>
    </nav>

    <!-- MAIN CONTENT -->
    <main class="flex-1 p-8 overflow-y-auto relative">

        <!-- Header Area -->
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-5xl font-black uppercase">Dashboard</h1>
            <button onclick="startTour()"
                class="neo-btn bg-[#FB7185] text-white px-6 py-3 text-lg flex items-center gap-2">
                <i class="fa-solid fa-play"></i> START TOUR
            </button>
        </div>

        <!-- Search Bar Area -->
        <div class="neo-card p-6 mb-8 flex gap-4 items-center" id="search-section">
            <div class="text-3xl mr-2">🔎</div>
            <input type="text" placeholder="ค้นหากิจกรรม..."
                class="flex-1 text-xl font-bold bg-transparent outline-none border-b-4 border-gray-300 focus:border-black p-2 transition-colors">
            <button class="neo-btn bg-black text-white px-6 py-2">ค้นหา</button>
        </div>

        <!-- Content Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Card 1 -->
            <div class="neo-card group" id="card-highlight">
                <div class="h-48 bg-blue-200 border-b-3 border-black relative overflow-hidden">
                    <img src="https://images.unsplash.com/photo-1540575467063-178a50c2df87?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80"
                        class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                    <div
                        class="absolute top-2 right-2 bg-white border-2 border-black px-2 font-bold text-sm shadow-[2px_2px_0 0 black]">
                        NEW</div>
                </div>
                <div class="p-4">
                    <h3 class="text-2xl font-bold mb-2">Tech Meetup</h3>
                    <p class="text-gray-600 mb-4">พบปะพูดคุยเรื่อง Tech...</p>
                    <button class="neo-btn w-full bg-[#60A5FA] py-2">รายละเอียด</button>
                </div>
            </div>

            <!-- Card 2 -->
            <div class="neo-card group">
                <div class="h-48 bg-green-200 border-b-3 border-black relative overflow-hidden">
                    <img src="https://images.unsplash.com/photo-1517048676732-d65bc937f952?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80"
                        class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                </div>
                <div class="p-4">
                    <h3 class="text-2xl font-bold mb-2">Design Workshop</h3>
                    <p class="text-gray-600 mb-4">เวิร์คช็อปออกแบบ UX/UI...</p>
                    <button class="neo-btn w-full bg-[#4ADE80] py-2">รายละเอียด</button>
                </div>
            </div>

            <!-- Stats Box -->
            <div class="neo-card p-6 bg-[#FACC15] flex flex-col justify-between" id="stats-box">
                <div>
                    <h3 class="text-xl font-bold border-b-2 border-black pb-2 mb-2">YOUR STATS</h3>
                    <p class="text-5xl font-black">12</p>
                    <p class="font-bold">Activities Joined</p>
                </div>
                <div class="mt-4 text-right">
                    <i class="fa-solid fa-chart-line text-4xl"></i>
                </div>
            </div>
        </div>

    </main>

    <!-- === TOUR COMPONENTS === -->

    <!-- 1. Backdrop -->
    <div id="tour-backdrop"></div>

    <!-- 2. Highlighter Frame -->
    <div id="tour-highlighter"></div>

    <!-- 3. Arrow SVG -->
    <svg id="tour-arrow" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" style="opacity: 0;">
        <path d="M10 90 Q 50 10 90 50" stroke="currentColor" stroke-width="8" stroke-linecap="round" fill="none" />
        <path d="M70 40 L 90 50 L 60 70" stroke="currentColor" stroke-width="8" stroke-linecap="round"
            stroke-linejoin="round" />
    </svg>

    <!-- 4. Popover Box -->
    <div id="tour-popover">
        <div class="step-badge" id="tour-step-num">1/4</div>

        <h3 class="text-2xl font-black uppercase mb-2" id="tour-title">Title Here</h3>
        <p class="text-gray-700 font-medium mb-6 leading-relaxed" id="tour-desc">Description goes here.</p>

        <div class="flex justify-between items-center">
            <button onclick="endTour()"
                class="text-gray-500 font-bold hover:text-black hover:underline text-sm">Skip</button>
            <button onclick="nextStep()" class="neo-btn bg-black text-white px-6 py-2 rounded-lg hover:bg-gray-800"
                id="tour-next-btn">
                ถัดไป <i class="fa-solid fa-arrow-right ml-1"></i>
            </button>
        </div>
    </div>

    <script>
        // --- TOUR DATA ---
        const steps = [
            {
                target: 'nav-search',
                title: 'เมนูค้นหา',
                desc: 'เริ่มต้นด้วยการกดปุ่มแว่นขยายตรงนี้ เพื่อค้นหากิจกรรมที่คุณสนใจทั้งหมด',
                placement: 'right'
            },
            {
                target: 'search-section',
                title: 'พิมพ์ชื่อกิจกรรม',
                desc: 'หรือจะพิมพ์ชื่อกิจกรรมลงในช่องนี้โดยตรง เพื่อความรวดเร็วก็ได้นะ',
                placement: 'bottom'
            },
            {
                target: 'card-highlight',
                title: 'การ์ดกิจกรรม',
                desc: 'กิจกรรมใหม่ๆ จะแสดงผลในรูปแบบการ์ดแบบนี้ กดดูรายละเอียดได้เลย',
                placement: 'right'
            },
            {
                target: 'stats-box',
                title: 'สถิติของคุณ',
                desc: 'ดูจำนวนกิจกรรมที่คุณเข้าร่วมทั้งหมดได้ที่กล่องสีเหลืองนี้',
                placement: 'left'
            }
        ];

        let currentStepIndex = 0;
        let isTourActive = false;

        // --- CORE FUNCTIONS ---

        function startTour() {
            if (isTourActive) return;
            isTourActive = true;
            currentStepIndex = 0;

            // Show Backdrop
            document.getElementById('tour-backdrop').classList.add('active');
            document.getElementById('tour-highlighter').classList.add('active');

            renderStep();
        }

        function endTour() {
            isTourActive = false;
            document.getElementById('tour-backdrop').classList.remove('active');
            document.getElementById('tour-highlighter').classList.remove('active');
            document.getElementById('tour-popover').style.opacity = '0';
            document.getElementById('tour-popover').style.transform = 'scale(0.9)';
            document.getElementById('tour-arrow').style.opacity = '0';
        }

        function nextStep() {
            if (currentStepIndex < steps.length - 1) {
                currentStepIndex++;
                renderStep();
            } else {
                // Finish
                endTour();
                // Optional: Show success confetti or message
            }
        }

        function renderStep() {
            const step = steps[currentStepIndex];
            const targetEl = document.getElementById(step.target);
            const highlighter = document.getElementById('tour-highlighter');
            const popover = document.getElementById('tour-popover');
            const arrow = document.getElementById('tour-arrow');

            if (!targetEl) return;

            // 1. Position Highlighter
            const rect = targetEl.getBoundingClientRect();
            // Add padding
            const padding = 10;
            highlighter.style.top = (rect.top - padding) + 'px';
            highlighter.style.left = (rect.left - padding) + 'px';
            highlighter.style.width = (rect.width + (padding * 2)) + 'px';
            highlighter.style.height = (rect.height + (padding * 2)) + 'px';

            // 2. Update Content
            document.getElementById('tour-title').innerText = step.title;
            document.getElementById('tour-desc').innerText = step.desc;
            document.getElementById('tour-step-num').innerText = `${currentStepIndex + 1}/${steps.length}`;

            // Change button text on last step
            const nextBtn = document.getElementById('tour-next-btn');
            if (currentStepIndex === steps.length - 1) {
                nextBtn.innerHTML = 'เสร็จสิ้น <i class="fa-solid fa-check ml-1"></i>';
                nextBtn.classList.remove('bg-black', 'text-white');
                nextBtn.classList.add('bg-[#FACC15]', 'text-black');
            } else {
                nextBtn.innerHTML = 'ถัดไป <i class="fa-solid fa-arrow-right ml-1"></i>';
                nextBtn.classList.add('bg-black', 'text-white');
                nextBtn.classList.remove('bg-[#FACC15]', 'text-black');
            }

            // 3. Position Popover & Arrow
            const popoverWidth = 320;
            const popoverHeight = popover.offsetHeight || 200; // Estimate if hidden
            const gap = 20;

            let popTop, popLeft, arrowRotation;

            // Simple placement logic
            if (step.placement === 'right') {
                popLeft = rect.right + gap + 40; // +40 for arrow space
                popTop = rect.top;
                arrowRotation = 0; // Arrow points left-ish (default svg logic needed adjustment)

                // Adjust Arrow SVG CSS transform
                arrow.style.left = (rect.right + 5) + 'px';
                arrow.style.top = (rect.top + 20) + 'px';
                arrow.style.transform = 'rotate(180deg)'; // Point left
            }
            else if (step.placement === 'left') {
                popLeft = rect.left - popoverWidth - gap - 40;
                popTop = rect.top;

                arrow.style.left = (rect.left - 65) + 'px';
                arrow.style.top = (rect.top + 20) + 'px';
                arrow.style.transform = 'rotate(0deg)'; // Point right
            }
            else if (step.placement === 'bottom') {
                popLeft = rect.left;
                popTop = rect.bottom + gap + 40;

                arrow.style.left = (rect.left + rect.width / 2 - 30) + 'px';
                arrow.style.top = (rect.bottom + 5) + 'px';
                arrow.style.transform = 'rotate(-90deg)'; // Point up
            }

            // Boundary checks (basic)
            if (popLeft + popoverWidth > window.innerWidth) popLeft = window.innerWidth - popoverWidth - 20;
            if (popTop + popoverHeight > window.innerHeight) popTop = window.innerHeight - popoverHeight - 20;

            popover.style.top = popTop + 'px';
            popover.style.left = popLeft + 'px';

            // Animation Reset (Bounce effect)
            popover.classList.remove('active');
            void popover.offsetWidth; // Trigger reflow
            popover.classList.add('active');

            // Show Arrow
            arrow.style.opacity = '1';
        }

        // Window resize handler
        window.addEventListener('resize', () => {
            if (isTourActive) renderStep();
        });

    </script>
</body>

</html>
