<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neo-Brutalist V2: More Interactions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* --- 1. FONTS & VARIABLES --- */
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap');

        :root {
            --bg-color: #e0f2fe;
            /* Light Blue */
            --accent-1: #a78bfa;
            /* Purple */
            --accent-2: #facc15;
            /* Yellow */
            --accent-3: #fb7185;
            /* Pink */
            --border-color: #000000;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg-color);
            color: black;
            overflow-x: hidden;
            cursor: none;
            /* Hide default cursor */
        }

        /* --- 2. UTILITIES --- */
        .neo-shadow {
            box-shadow: 5px 5px 0px 0px var(--border-color);
            transition: all 0.1s ease;
        }

        .neo-shadow:active {
            box-shadow: 0px 0px 0px 0px var(--border-color);
            transform: translate(5px, 5px);
        }

        .hoverable {
            cursor: none;
        }

        /* Ensure target for custom cursor */

        /* --- 3. BACKGROUND & DECORATION --- */
        .bg-grid {
            background-size: 40px 40px;
            background-image:
                linear-gradient(to right, rgba(0, 0, 0, 0.1) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 0, 0, 0.1) 1px, transparent 1px);
            animation: scrollGrid 20s linear infinite;
        }

        @keyframes scrollGrid {
            0% {
                background-position: 0 0;
            }

            100% {
                background-position: 40px 40px;
            }
        }

        /* --- 4. NEW TRANSITION: DIAGONAL SWIPE --- */
        #transition-wipe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10000;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* The black block that swipes */
        .wipe-block {
            position: absolute;
            background-color: #000;
            width: 150vw;
            /* Wider than screen to cover corners when rotated */
            height: 150vh;
            /* Taller than screen */
            transform: translateY(150%) rotate(-15deg);
            /* Start below */
            transition: transform 0.8s cubic-bezier(0.76, 0, 0.24, 1);
        }

        /* State: Covering the screen */
        .wipe-block.active {
            transform: translateY(0%) rotate(-15deg);
        }

        /* State: Leaving to top */
        .wipe-block.exit {
            transform: translateY(-150%) rotate(-15deg);
        }

        .loader-text {
            color: white;
            font-size: 4rem;
            font-weight: 700;
            text-transform: uppercase;
            z-index: 10002;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .loader-text.show {
            opacity: 1;
        }

        /* --- 5. COMPONENT: HOVER REVEAL --- */
        .reveal-item {
            position: relative;
            z-index: 20;
        }

        .reveal-item:hover {
            color: var(--accent-3);
            /* Pink */
            background-color: black;
        }

        #hover-image-container {
            position: fixed;
            pointer-events: none;
            z-index: 15;
            /* Behind text but above content */
            width: 300px;
            height: 200px;
            top: 0;
            left: 0;
            opacity: 0;
            transform: scale(0.8) translate(-50%, -50%);
            transition: opacity 0.2s, transform 0.2s;
            overflow: hidden;
            border: 4px solid black;
            box-shadow: 8px 8px 0 0 black;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #hover-image-container.active {
            opacity: 1;
            transform: scale(1) translate(-50%, -50%);
        }

        /* --- 6. COMPONENT: SLIDER --- */
        .slider-container {
            display: flex;
            overflow: hidden;
            scroll-behavior: smooth;
        }

        .slide {
            min-width: 100%;
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* --- 7. COMPONENT: TOAST --- */
        #toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            transform: translateY(200%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 9000;
        }

        #toast.show {
            transform: translateY(0);
        }

        /* --- 8. SCROLL PROGRESS --- */
        #scroll-progress {
            position: fixed;
            top: 0;
            left: 0;
            height: 8px;
            background: var(--accent-2);
            width: 0%;
            z-index: 9999;
            border-bottom: 2px solid black;
            border-right: 2px solid black;
        }

        /* Custom Cursor */
        #cursor {
            width: 24px;
            height: 24px;
            border: 2px solid black;
            background-color: var(--accent-2);
            position: fixed;
            pointer-events: none;
            z-index: 10003;
            /* Top most */
            transition: transform 0.1s ease, background-color 0.2s, width 0.2s, height 0.2s;
            mix-blend-mode: exclusion;
        }

        #cursor.hovered {
            width: 48px;
            height: 48px;
            background-color: white;
            border-radius: 50%;
            mix-blend-mode: difference;
        }
    </style>
</head>

<body class="min-h-screen relative pb-20">

    <!-- Scroll Progress Bar -->
    <div id="scroll-progress"></div>

    <!-- Custom Cursor -->
    <div id="cursor" class="hidden md:block"></div>

    <!-- Toast Notification -->
    <div id="toast" class="bg-white border-4 border-black p-4 neo-shadow flex gap-4 items-center max-w-sm">
        <div class="bg-green-400 w-10 h-10 border-2 border-black flex items-center justify-center font-bold text-xl">!
        </div>
        <div>
            <h4 class="font-bold uppercase">System Alert</h4>
            <p class="text-sm">Action completed successfully.</p>
        </div>
        <button onclick="hideToast()" class="ml-auto font-bold hover:text-red-500 hoverable">X</button>
    </div>

    <!-- Hover Image Container (Hidden by default) -->
    <div id="hover-image-container">
        <!-- Image placeholder -->
        <div class="w-full h-full bg-cover bg-center" id="hover-img-target"
            style="background-image: linear-gradient(45deg, #facc15 25%, #fb7185 25%, #fb7185 50%, #facc15 50%, #facc15 75%, #fb7185 75%, #fb7185 100%); background-size: 20px 20px;">
            <div class="w-full h-full flex items-center justify-center font-bold text-2xl bg-white/50 backdrop-blur-sm">
                IMG PREVIEW
            </div>
        </div>
    </div>

    <!-- New Transition Overlay -->
    <div id="transition-wipe">
        <div class="wipe-block"></div>
        <div class="loader-text">LOADING...</div>
    </div>

    <!-- Animated Background Layer -->
    <div class="fixed inset-0 w-full h-full bg-grid -z-20"></div>

    <!-- Main Content -->
    <div class="relative z-10 max-w-6xl mx-auto p-4 md:p-10">

        <!-- Header -->
        <header class="mb-16 flex flex-col md:flex-row justify-between items-end gap-6 border-b-4 border-black pb-8">
            <div>
                <h1 class="text-6xl md:text-8xl font-bold uppercase tracking-tighter leading-[0.8]">
                    NEO<br>BRUTAL
                </h1>
                <div class="mt-4 bg-black text-white inline-block px-4 py-1 text-xl font-bold transform -rotate-2">
                    V2.0 // NEW_INTERACTIONS
                </div>
            </div>

            <button onclick="triggerTransition()"
                class="border-2 border-black bg-[#a78bfa] px-8 py-4 font-bold text-xl neo-shadow hover:bg-white transition-colors hoverable">
                TEST TRANSITION ->
            </button>
        </header>

        <!-- 1. HOVER REVEAL MENU -->
        <section class="mb-20">
            <h2 class="text-2xl font-bold mb-6 border-l-4 border-black pl-4">01. HOVER REVEAL MENU</h2>
            <div class="border-y-4 border-black">
                <!-- List Item 1 -->
                <div class="reveal-item border-b-2 border-black p-6 text-3xl md:text-5xl font-bold uppercase cursor-pointer flex justify-between group hoverable"
                    data-color="bg-purple-300">
                    <span>Creative Design</span>
                    <span class="opacity-0 group-hover:opacity-100 transition-opacity">-></span>
                </div>
                <!-- List Item 2 -->
                <div class="reveal-item border-b-2 border-black p-6 text-3xl md:text-5xl font-bold uppercase cursor-pointer flex justify-between group hoverable"
                    data-color="bg-yellow-300">
                    <span>Development</span>
                    <span class="opacity-0 group-hover:opacity-100 transition-opacity">-></span>
                </div>
                <!-- List Item 3 -->
                <div class="reveal-item p-6 text-3xl md:text-5xl font-bold uppercase cursor-pointer flex justify-between group hoverable"
                    data-color="bg-pink-300">
                    <span>Strategy</span>
                    <span class="opacity-0 group-hover:opacity-100 transition-opacity">-></span>
                </div>
            </div>
        </section>

        <!-- 2. BRUTALIST SLIDER -->
        <section class="mb-20">
            <h2 class="text-2xl font-bold mb-6 border-l-4 border-black pl-4">02. RAW SLIDER</h2>

            <div class="relative border-4 border-black bg-white p-2 neo-shadow">
                <!-- Slider Window -->
                <div class="overflow-hidden border-2 border-black aspect-video relative">
                    <div class="slider-container" id="slider-track">
                        <!-- Slide 1 -->
                        <div class="slide bg-blue-200 flex items-center justify-center relative">
                            <div class="absolute inset-0 opacity-20"
                                style="background-image: radial-gradient(circle, black 2px, transparent 2.5px); background-size: 20px 20px;">
                            </div>
                            <h3 class="text-6xl font-bold border-4 border-black bg-white p-4 transform -rotate-6">SLIDE
                                01</h3>
                        </div>
                        <!-- Slide 2 -->
                        <div class="slide bg-green-200 flex items-center justify-center relative">
                            <div class="absolute inset-0 opacity-20"
                                style="background-image: repeating-linear-gradient(45deg, black 0, black 2px, transparent 0, transparent 50%); background-size: 20px 20px;">
                            </div>
                            <h3 class="text-6xl font-bold border-4 border-black bg-white p-4 transform rotate-3">SLIDE
                                02</h3>
                        </div>
                        <!-- Slide 3 -->
                        <div class="slide bg-red-200 flex items-center justify-center relative">
                            <div class="absolute inset-0 opacity-20"
                                style="background-image: linear-gradient(to right, black 1px, transparent 1px); background-size: 40px 100%;">
                            </div>
                            <h3 class="text-6xl font-bold border-4 border-black bg-white p-4 transform rotate-12">SLIDE
                                03</h3>
                        </div>
                    </div>
                </div>

                <!-- Controls -->
                <div class="flex justify-between mt-2 gap-2">
                    <button onclick="moveSlide(-1)"
                        class="flex-1 bg-black text-white font-bold py-4 hover:bg-gray-800 hoverable text-2xl">
                        < PREV</button>
                            <button onclick="moveSlide(1)"
                                class="flex-1 bg-black text-white font-bold py-4 hover:bg-gray-800 hoverable text-2xl">NEXT
                                ></button>
                </div>
            </div>
        </section>

        <!-- 3. TOAST TRIGGER & OTHERS -->
        <section class="grid grid-cols-1 md:grid-cols-2 gap-8">

            <!-- Toast Trigger -->
            <div class="border-4 border-black bg-[#facc15] p-8 neo-shadow text-center">
                <h2 class="text-2xl font-bold mb-4 uppercase">Notifications</h2>
                <p class="mb-6 font-bold">Simulate a system alert popping up.</p>
                <button onclick="showToast()"
                    class="bg-white border-2 border-black px-6 py-3 font-bold neo-shadow hoverable active:translate-x-1 active:translate-y-1 active:shadow-none">
                    TRIGGER TOAST ALERT
                </button>
            </div>

            <!-- Glitch Card -->
            <div
                class="border-4 border-black bg-black p-8 neo-shadow text-center group hoverable overflow-hidden relative">
                <div
                    class="absolute inset-0 bg-white translate-y-full group-hover:translate-y-0 transition-transform duration-300 ease-in-out z-0">
                </div>
                <h2 class="text-4xl font-bold text-white group-hover:text-black relative z-10 transition-colors">
                    HOVER<br>REVEAL
                </h2>
                <div class="absolute top-2 right-2 w-4 h-4 bg-white rounded-full group-hover:bg-black z-10"></div>
            </div>

        </section>

    </div>

    <script>
        // --- 1. DIAGONAL SWIPE TRANSITION ---
        window.addEventListener('load', () => {
            // Initial reveal
            const wipe = document.querySelector('.wipe-block');
            const text = document.querySelector('.loader-text');

            // Start state is covering screen (defined in CSS manually for first load, or JS)
            // But here we let it reveal
            wipe.classList.add('active'); // Cover first (simulate page load start)

            setTimeout(() => {
                wipe.classList.remove('active');
                wipe.classList.add('exit'); // Slide up and away
            }, 800);
        });

        function triggerTransition() {
            const wipe = document.querySelector('.wipe-block');
            const text = document.querySelector('.loader-text');

            // Reset classes
            wipe.classList.remove('exit');
            wipe.style.transition = 'transform 0.8s cubic-bezier(0.76, 0, 0.24, 1)';

            // 1. Swipe In
            wipe.classList.add('active');

            // 2. Show Text
            setTimeout(() => {
                text.classList.add('show');
            }, 400);

            // 3. Simulate Load & Swipe Out
            setTimeout(() => {
                text.classList.remove('show');
                // Wait for text fade out
                setTimeout(() => {
                    wipe.classList.remove('active');
                    wipe.classList.add('exit');
                }, 300);
            }, 2000);
        }


        // --- 2. HOVER REVEAL LOGIC ---
        const revealItems = document.querySelectorAll('.reveal-item');
        const hoverImgContainer = document.getElementById('hover-image-container');
        const hoverImgTarget = document.getElementById('hover-img-target');

        revealItems.forEach(item => {
            item.addEventListener('mouseenter', () => {
                hoverImgContainer.classList.add('active');
                // Change "image" color based on data attribute
                const colorClass = item.getAttribute('data-color');
                // Reset bg color classes
                hoverImgTarget.className = `w-full h-full bg-cover bg-center ${colorClass}`;
            });

            item.addEventListener('mouseleave', () => {
                hoverImgContainer.classList.remove('active');
            });

            item.addEventListener('mousemove', (e) => {
                // Move the container with cursor
                // Offset slightly so cursor isn't directly on top
                const x = e.clientX;
                const y = e.clientY;

                // Add some interpolation/delay effect could be done here with requestAnimationFrame
                // But direct mapping is snappier for brutalism
                hoverImgContainer.style.left = `${x}px`;
                hoverImgContainer.style.top = `${y}px`;

                // Rotate based on movement direction (simple version)
                const rotX = (x / window.innerWidth - 0.5) * 20;
                hoverImgContainer.style.transform = `translate(-50%, -50%) rotate(${rotX}deg)`;
            });
        });


        // --- 3. SLIDER LOGIC ---
        let currentSlide = 0;
        const totalSlides = 3;
        const track = document.getElementById('slider-track');

        function moveSlide(direction) {
            currentSlide += direction;

            // Loop functionality
            if (currentSlide < 0) currentSlide = totalSlides - 1;
            if (currentSlide >= totalSlides) currentSlide = 0;

            // Move track
            track.style.transform = `translateX(-${currentSlide * 100}%)`;
        }


        // --- 4. TOAST LOGIC ---
        const toast = document.getElementById('toast');
        let toastTimeout;

        function showToast() {
            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(hideToast, 4000); // Auto hide after 4s
        }

        function hideToast() {
            toast.classList.remove('show');
        }


        // --- 5. SCROLL PROGRESS ---
        window.addEventListener('scroll', () => {
            const scrollTotal = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrollCurrent = document.documentElement.scrollTop;
            const scrollPercentage = (scrollCurrent / scrollTotal) * 100;

            document.getElementById('scroll-progress').style.width = scrollPercentage + '%';
        });


        // --- 6. CUSTOM CURSOR (Reuse) ---
        const cursor = document.getElementById('cursor');
        const hoverables = document.querySelectorAll('.hoverable');

        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // Add hover class to body elements dynamically if new ones added? 
        // Better to delegate or just re-query. For now, static query is fine.
        document.querySelectorAll('.hoverable').forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('hovered'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('hovered'));
        });

        if ('ontouchstart' in window) {
            cursor.style.display = 'none';
            document.body.style.cursor = 'auto';
        }
    </script>
</body>

</html>
